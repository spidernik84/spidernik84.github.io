<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sand: #f5f0e8;
      --warm-white: #faf8f4;
      --clay: #c8805a;
      --clay-light: #e8a882;
      --dark: #2a2118;
      --mid: #6b5c4e;
      --light-mid: #a89585;
      --border: #e0d5c8;
      --card: #ffffff;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--warm-white);
      color: var(--dark);
      font-weight: 300;
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* ── Language Toggle ── */
    #lang-toggle {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 100;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 2rem;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--mid);
      display: flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      transition: box-shadow 0.2s, transform 0.2s;
      user-select: none;
    }
    #lang-toggle:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      transform: translateY(-1px);
    }
    .flag { font-size: 1.1rem; }

    /* ── Nav ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 50;
      padding: 1.5rem 3rem;
      display: flex;
      align-items: center;
      background: rgba(250, 248, 244, 0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s;
    }
    nav.scrolled { border-bottom-color: var(--border); }
    .nav-logo {
      font-family: 'Lora', serif;
      font-size: 1.05rem;
      color: var(--dark);
      letter-spacing: 0.01em;
    }
    .nav-links {
      margin-left: auto;
      margin-right: 4rem;
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }
    .nav-links a {
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 400;
      color: var(--mid);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--clay); }

    /* ── Hero ── */
    #hero {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 8rem 3rem 5rem;
      background:
        radial-gradient(ellipse 60% 50% at 80% 30%, rgba(200,128,90,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 60% at 10% 80%, rgba(200,128,90,0.05) 0%, transparent 70%),
        var(--warm-white);
    }
    .hero-inner {
      max-width: 780px;
      text-align: center;
      animation: fadeUp 0.9s ease both;
    }
    .hero-eyebrow {
      display: inline-block;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--clay);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.1s ease forwards;
    }
    .hero-name {
      font-family: 'Lora', serif;
      font-size: clamp(3rem, 7vw, 5.5rem);
      font-weight: 600;
      line-height: 1.1;
      color: var(--dark);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.2s ease forwards;
    }
    .hero-name em {
      font-style: italic;
      color: var(--clay);
    }
    .hero-tagline {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: var(--mid);
      max-width: 520px;
      margin: 0 auto 2.5rem;
      opacity: 0;
      animation: fadeUp 0.8s 0.35s ease forwards;
    }
    .hero-cta {
      opacity: 0;
      animation: fadeUp 0.8s 0.5s ease forwards;
    }
    .btn {
      display: inline-block;
      padding: 0.85rem 2.2rem;
      background: var(--clay);
      color: #fff;
      text-decoration: none;
      border-radius: 2rem;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 18px rgba(200,128,90,0.3);
    }
    .btn:hover {
      background: #b8704a;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(200,128,90,0.35);
    }
    .btn-ghost {
      background: transparent;
      color: var(--mid);
      border: 1px solid var(--border);
      box-shadow: none;
      margin-left: 1rem;
    }
    .btn-ghost:hover {
      background: var(--sand);
      color: var(--dark);
      box-shadow: none;
    }

    /* ── Sections shared ── */
    section { padding: 6rem 3rem; }
    .section-inner { max-width: 860px; margin: 0 auto; }
    .section-label {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--clay);
      margin-bottom: 1rem;
    }
    .section-title {
      font-family: 'Lora', serif;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 600;
      line-height: 1.25;
      color: var(--dark);
      margin-bottom: 1.5rem;
    }
    .section-body {
      font-size: 1.05rem;
      color: var(--mid);
      max-width: 600px;
      line-height: 1.8;
    }

    /* ── About ── */
    #about { background: var(--sand); }
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: center;
    }
    .about-photo-wrap {
      position: relative;
    }
    .about-photo {
      width: 100%;
      aspect-ratio: 4/5;
      border-radius: 1rem;
      background: linear-gradient(135deg, var(--clay-light) 0%, var(--clay) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .about-photo-initials {
      font-family: 'Lora', serif;
      font-size: 5rem;
      color: rgba(255,255,255,0.6);
      font-style: italic;
    }
    .about-photo-accent {
      position: absolute;
      bottom: -1.5rem;
      right: -1.5rem;
      width: 60%;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--warm-white);
      z-index: -1;
    }
    .about-stats {
      display: flex;
      gap: 2.5rem;
      margin-top: 2.5rem;
      padding-top: 2.5rem;
      border-top: 1px solid var(--border);
    }
    .stat-num {
      font-family: 'Lora', serif;
      font-size: 2rem;
      font-weight: 600;
      color: var(--clay);
      display: block;
    }
    .stat-label {
      font-size: 0.8rem;
      color: var(--light-mid);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ── Services ── */
    #services { background: var(--warm-white); }
    .services-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin-top: 3rem;
    }
    .service-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 2rem;
      transition: transform 0.25s, box-shadow 0.25s;
    }
    .service-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.07);
    }
    .service-icon {
      width: 2.8rem;
      height: 2.8rem;
      background: var(--sand);
      border-radius: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      margin-bottom: 1.25rem;
    }
    .service-title {
      font-family: 'Lora', serif;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 0.6rem;
    }
    .service-desc {
      font-size: 0.9rem;
      color: var(--mid);
      line-height: 1.7;
    }

    /* ── Contact ── */
    #contact { background: var(--sand); }
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5rem;
      align-items: start;
    }
    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .form-field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .form-field label {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--light-mid);
    }
    .form-field input,
    .form-field textarea {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--dark);
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-radius: 0.6rem;
      padding: 0.75rem 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      resize: vertical;
    }
    .form-field input:focus,
    .form-field textarea:focus {
      border-color: var(--clay-light);
      box-shadow: 0 0 0 3px rgba(200,128,90,0.1);
    }
    .form-field textarea { min-height: 130px; }
    .contact-details { padding-top: 0.5rem; }
    .contact-item {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      margin-bottom: 1.75rem;
    }
    .contact-icon {
      width: 2.5rem;
      height: 2.5rem;
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .contact-item-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--light-mid);
      margin-bottom: 0.15rem;
    }
    .contact-item-value {
      font-size: 0.95rem;
      color: var(--dark);
    }

    /* ── Footer ── */
    footer {
      padding: 2.5rem 3rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.82rem;
      color: var(--light-mid);
    }
    .footer-name {
      font-family: 'Lora', serif;
      color: var(--mid);
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .reveal {
      opacity: 0;
      transform: translateY(22px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: none;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      nav { padding: 1.2rem 1.5rem; }
      .nav-links { display: none; }
      section { padding: 4rem 1.5rem; }
      .about-grid,
      .contact-grid { grid-template-columns: 1fr; gap: 3rem; }
      .services-grid { grid-template-columns: 1fr; }
      .about-photo { aspect-ratio: 3/2; }
      #lang-toggle { top: 1rem; right: 1rem; }
      footer { flex-direction: column; gap: 0.5rem; text-align: center; }
    }
  </style>

    /* ─── Language detection & switching ─── */
    function detectLang() {
      const saved = localStorage.getItem('lang');
      if (saved) return saved;
      const browser = navigator.language || navigator.userLanguage || 'en';
      return browser.toLowerCase().startsWith('sv') ? 'sv' : 'en';
    }

    let currentLang = detectLang();

    function applyLang(lang) {
      currentLang = lang;
      localStorage.setItem('lang', lang);
      document.documentElement.lang = lang;

      const t = i18n[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key]) el.textContent = t[key];
      });
      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        if (t[key]) el.placeholder = t[key];
      });

      const toggle = document.getElementById('lang-toggle');
      const flagIcon = document.getElementById('flag-icon');
      const langLabel = document.getElementById('lang-label');
      if (lang === 'sv') {
        flagIcon.textContent = '🇬🇧';
        langLabel.textContent = 'EN';
        toggle.title = 'Switch to English';
      } else {
        flagIcon.textContent = '🇸🇪';
        langLabel.textContent = 'SV';
        toggle.title = 'Byt till svenska';
      }
    }

    document.getElementById('lang-toggle').addEventListener('click', () => {
      applyLang(currentLang === 'sv' ? 'en' : 'sv');
    });

    applyLang(currentLang);

    /* ─── Scroll effects ─── */
    const nav = document.getElementById('main-nav');
    window.addEventListener('scroll', () => {
      nav.classList.toggle('scrolled', window.scrollY > 30);
    });

    const revealEls = document.querySelectorAll('.reveal');
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.12 });
    revealEls.forEach(el => observer.observe(el));

    /* ─── Form ─── */
    function handleSubmit(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button[type=submit]');
      const t = i18n[currentLang];
      btn.textContent = currentLang === 'sv' ? 'Skickat! ✓' : 'Sent! ✓';
      btn.style.background = '#6a9e6a';
      btn.disabled = true;
      setTimeout(() => {
        btn.textContent = t.form_send;
        btn.style.background = '';
        btn.disabled = false;
        e.target.reset();
      }, 3000);
    }
  </script>
